version: 2
registries:
    npm-github:
        type: npm-registry
        url: https://npm.pkg.github.com
        token: ${{secrets.GH_GENERAL_ACCESS_TOKEN}}
updates:
    -   package-ecosystem: "npm"
        directory: "/"
        registries:
            - npm-github
        schedule:
            interval: weekly
            day: wednesday
            time: "12:00"
            timezone: America/Chicago
